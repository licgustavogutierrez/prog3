<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calcular Resultado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        #resultado {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h2>El producto de la potencia de igual base ...... 
        a<sup>m</sup>.a<sup>n</sup> = a<sup>m</sup>+<sup>n</sup>  </h2>
<h1> Cuanto es 2<sup>5</sup> + 2<sup>3</sup>=     </h1>
      
    <input type="number" id="base" placeholder="Escribí la base">
    <input type="number" id="potencia" placeholder="Escribí la potencia">
    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>

    <script>
        function calcular() {
            let base = document.getElementById("base").value;

            if (base == "") {
                document.getElementById("resultado").innerHTML = "Por favor, ingresá un valor";
                return;
            }

            let resultado = base ⁿ potencia; // Acá podés cambiar la operación

            document.getElementById("resultado").innerHTML = "Resultado: " + resultado;
        }
    </script>

</body>
</html>
