<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calcular Resultado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        #resultado {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>El producto de la potencia de igual base ...... a<sup>m</sup>   </h1>

    <input type="number" id="valor" placeholder="Escribí un número">
    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>

    <script>
        function calcular() {
            let casa = document.getElementById("valor").value;

            if (casa === "") {
                document.getElementById("resultado").innerHTML = "Por favor, ingresá un valor";
                return;
            }

            let resultado = casa * 2; // Acá podés cambiar la operación

            document.getElementById("resultado").innerHTML = "Resultado: " + resultado;
        }
    </script>

</body>
</html>
